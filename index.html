<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chemdex — Molecule Discovery Lab</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <span class="logo">⚗️</span>
      <h1>Chem<span>dex</span></h1>
    </div>
    <nav class="tabs">
      <button class="tab active" data-tab="lab">🧪 Lab</button>
      <button class="tab" data-tab="dex">📖 Dex</button>
    </nav>
    <div class="progress">
      <span id="progressLabel">0 / 10</span>
      <div class="progress-bar"><div id="progressFill"></div></div>
    </div>
  </header>

  <main>
    <!-- ============ LAB ============ -->
    <section id="lab" class="view active">
      <div class="lab-grid">

        <!-- Atom palette -->
        <div class="panel">
          <h2>Atoms</h2>
          <p class="hint">Drag an atom onto the workbench — or just click it.</p>
          <div id="palette" class="palette"></div>
        </div>

        <!-- Workbench -->
        <div class="panel workbench-panel">
          <h2>Workbench</h2>
          <div id="workbench" class="workbench">
            <p class="workbench-empty">Drop atoms here to build a molecule</p>
          </div>
          <div class="formula-line">
            Formula: <strong id="liveFormula">—</strong>
          </div>
          <div class="lab-actions">
            <button id="combineBtn" class="btn btn-primary">⚡ Combine</button>
            <button id="clearBtn" class="btn">Clear</button>
          </div>
          <p id="labMessage" class="lab-message"></p>
        </div>

      </div>
    </section>

    <!-- ============ DEX ============ -->
    <section id="dex" class="view">
      <div class="dex-controls">
        <div id="filters" class="filters"></div>
        <button id="resetBtn" class="btn btn-danger">Reset progress</button>
      </div>
      <div id="dexGrid" class="dex-grid"></div>
    </section>
  </main>

  <!-- Modal (discovery + detail) -->
  <div id="modal" class="modal-overlay" hidden>
    <div class="modal" id="modalCard"></div>
  </div>

  <!-- Lightbox (zoomable structure image) -->
  <div id="lightbox" class="lightbox" hidden>
    <div class="lightbox-toolbar">
      <button id="lbOut"   title="Zoom out">−</button>
      <button id="lbReset" title="Reset">Reset</button>
      <button id="lbIn"    title="Zoom in">+</button>
      <span id="lbLabel" class="lb-label"></span>
      <button id="lbClose" title="Close" class="lb-close">✕</button>
    </div>
    <div class="lightbox-stage" id="lbStage">
      <img id="lbImg" alt="structure" draggable="false" />
    </div>
    <p class="lb-hint">Scroll to zoom · drag to pan</p>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
