<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chemdex — Molecule Discovery Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <span class="logo">⚗️</span>
      <div class="brand-text">
        <h1>Chem<span>dex</span></h1>
        <p class="tagline" data-i18n="tagline">Molecule Discovery Lab</p>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab active" data-tab="lab" data-i18n="tabLab">🧪 Lab</button>
      <button class="tab" data-tab="dex" data-i18n="tabDex">📖 Dex</button>
      <button class="tab" data-tab="quests" data-i18n="tabQuests">🏅 Quests</button>
    </nav>
    <button id="levelChip" class="level-chip" title="Level"></button>
    <div class="progress">
      <span id="progressLabel">0 / 20</span>
      <div class="progress-bar"><div id="progressFill"></div></div>
    </div>
    <button id="muteBtn" class="icon-btn" title="Sound">🔊</button>
    <div class="lang-switch">
      <button class="lang" data-lang="en">EN</button>
      <button class="lang" data-lang="fr">FR</button>
    </div>
  </header>

  <main>
    <!-- ============ LAB ============ -->
    <section id="lab" class="view active">

      <!-- Daily puzzle banner — one per day, no streak -->
      <div id="dailyPanel" class="daily-panel">
        <div class="daily-main">
          <span class="daily-emoji">🧩</span>
          <div class="daily-body">
            <div id="dailyTitle" class="daily-title">🧩 Today's puzzle</div>
            <p id="dailyPrompt" class="daily-prompt"></p>
            <div id="dailyHintBox" class="daily-hintbox" hidden></div>
          </div>
          <button id="dailyHintBtn" class="btn daily-hint-btn" hidden></button>
        </div>
      </div>

      <div class="lab-grid">

        <!-- Atom palette -->
        <div class="panel">
          <h2 data-i18n="atoms">Atoms</h2>
          <p class="hint" data-i18n="atomsHint">Drag an atom onto the workbench — or just click it.</p>
          <div id="palette" class="palette"></div>
        </div>

        <!-- Workbench -->
        <div class="panel workbench-panel">
          <h2 data-i18n="workbench">Workbench</h2>
          <div id="workbench" class="workbench">
            <p class="workbench-empty" data-i18n="workbenchEmpty">Drop atoms here to build a molecule</p>
          </div>
          <div class="formula-line">
            <span data-i18n="formula">Formula:</span> <strong id="liveFormula">—</strong>
          </div>
          <div class="lab-actions">
            <button id="combineBtn" class="btn btn-primary" data-i18n="combine">⚡ Combine</button>
            <button id="clearBtn" class="btn" data-i18n="clear">Clear</button>
          </div>
          <p id="labMessage" class="lab-message"></p>
        </div>

      </div>
    </section>

    <!-- ============ DEX ============ -->
    <section id="dex" class="view">
      <div class="dex-controls">
        <div id="filters" class="filters"></div>
        <button id="resetBtn" class="btn btn-danger" data-i18n="resetProgress">Reset progress</button>
      </div>
      <div id="dexGrid" class="dex-grid"></div>
    </section>

    <!-- ============ QUESTS ============ -->
    <section id="quests" class="view">
      <div id="questsContent"></div>
    </section>
  </main>

  <!-- Mascot -->
  <div id="mascot" class="mascot" title="Hint">
    <div id="mascotBubble" class="mascot-bubble" hidden></div>
    <div id="mascotAvatar" class="mascot-avatar">⚛️</div>
  </div>

  <!-- Modal (discovery + detail) -->
  <div id="modal" class="modal-overlay" hidden>
    <div class="modal" id="modalCard"></div>
  </div>

  <!-- Lightbox (zoomable structure image) -->
  <div id="lightbox" class="lightbox" hidden>
    <div class="lightbox-toolbar">
      <button id="lbOut"   title="Zoom out">−</button>
      <button id="lbReset" title="Reset" data-i18n="lbReset">Reset</button>
      <button id="lbIn"    title="Zoom in">+</button>
      <span id="lbLabel" class="lb-label"></span>
      <button id="lbClose" title="Close" class="lb-close">✕</button>
    </div>
    <div class="lightbox-stage" id="lbStage">
      <img id="lbImg" alt="structure" draggable="false" />
    </div>
    <p class="lb-hint" data-i18n="lbHint">Scroll to zoom · drag to pan</p>
  </div>

  <script src="data.js"></script>
  <script src="i18n.js"></script>
  <script src="game.js"></script>
  <script src="app.js"></script>
</body>
</html>
